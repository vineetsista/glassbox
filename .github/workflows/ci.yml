name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install deps (cpu torch)
        run: |
          python -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install --quiet numpy pytest ruff mypy
      - name: ruff
        run: ruff check train grok sae scripts tests
      - name: mypy
        run: mypy train grok sae scripts tests
      - name: pytest (fixtures only, no training)
        run: pytest tests/ -q

  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: clang-format check
        run: |
          clang-format --dry-run --Werror engine/src/*.hpp engine/src/*.cpp engine/tests/*.cpp
      - name: configure + build
        run: cmake -S engine -B engine/build -G Ninja -DCMAKE_BUILD_TYPE=Release && ninja -C engine/build
      - name: ctest
        run: ctest --test-dir engine/build --output-on-failure

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.61
      - name: install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: emscripten build
        run: |
          emcmake cmake -S engine -B engine/build-wasm -G Ninja -DCMAKE_BUILD_TYPE=Release
          ninja -C engine/build-wasm

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: build
        working-directory: web
        run: |
          npm ci
          npm run build
